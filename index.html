<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Familjens Planerare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* Alla dina befintliga stilar (oförändrade) */
    :root {
      --bg:#F0EDF8; --surface:#fff; --surface2:#F7F5FC; --border:#E4DEFC;
      --primary:#6C47E8; --primary-soft:#EDE8FC; --primary-glow:rgba(108,71,232,0.18);
      --emerald:#22C08A; --emerald-soft:#DCFDF2;
      --rose:#F05E7A; --rose-soft:#FDEDF0;
      --amber:#F59E0B; --amber-soft:#FEF3C7;
      --text:#1E1535; --text2:#7168A0; --text3:#A89FCE;
      --r:20px; --rsm:14px;
      --shadow:0 4px 24px rgba(108,71,232,0.10);
      --shadow-sm:0 2px 10px rgba(108,71,232,0.07);
      --font:'Nunito',sans-serif;
    }
    /* ... (resten av din CSS är oförändrad) ... */
  </style>
</head>
<body class="locked">

<!-- Alla dina befintliga element (login, home, detail, modals etc.) är oförändrade -->

<!-- NY: Inställningar Modal -->
<div class="modal-ov h" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <div class="modal-ttl"><i class="fas fa-cog" style="color:var(--primary)"></i> Inställningar & Synk</div>
      <button class="modal-x" onclick="closeSettings()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" style="padding:20px 24px">
      <h3 style="margin:0 0 12px 0;color:var(--text)">📥 Lokala backup</h3>
      <div style="display:grid;gap:10px;margin-bottom:24px">
        <button onclick="exportData()" class="modal-btn" style="background:var(--primary);color:#fff">
          <i class="fas fa-download"></i> Exportera all data (JSON)
        </button>
        <label class="modal-btn" style="background:var(--emerald);color:#fff;text-align:center;cursor:pointer">
          <i class="fas fa-upload"></i> Importera JSON-backup
          <input type="file" id="importFile" accept=".json" onchange="importData(event)" style="display:none">
        </label>
      </div>

      <hr style="margin:20px 0;border-color:var(--border)">

      <h3 style="margin:0 0 12px 0;color:var(--text)">☁️ Supabase Synk (Realtid)</h3>
      <div id="supabaseStatus" style="padding:12px;border-radius:12px;background:var(--surface2);margin-bottom:16px;font-size:14px"></div>
      
      <input type="text" id="supabaseUrl" class="form-input" placeholder="Supabase URL[](https://xyz.supabase.co)" style="margin-bottom:10px">
      <input type="password" id="supabaseKey" class="form-input" placeholder="Anonym nyckel (eyJ...)" style="margin-bottom:16px">
      
      <div style="display:flex;gap:10px">
        <button onclick="saveSupabaseConfig()" class="modal-btn" style="background:var(--primary);flex:1">Spara & Anslut</button>
        <button onclick="disconnectSupabase()" class="modal-btn mbtn-neutral" style="flex:1">Koppla från</button>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="modal-btn mbtn-neutral" onclick="closeSettings()">Stäng</button>
    </div>
  </div>
</div>

<!-- Dina befintliga modals och innehåll fortsätter här... -->

<script>
// === DINA BEFINTLIGA VARIABLER OCH FUNKTIONER (oförändrade) ===
const PERSON_COLORS = ['#6C47E8','#22C08A','#F05E7A','#F59E0B','#0EA5E9','#EC4899','#8B5CF6','#14B8A6'];
// ... (alla dina befintliga variabler och funktioner som sl(), tasks, renderCards etc. är oförändrade) ...

// === NY: SUPABASE INTEGRATION ===
let supabaseClient = null;
let isSupabaseEnabled = false;

function initSupabase() {
  const url = localStorage.getItem('supabaseUrl');
  const key = localStorage.getItem('supabaseAnonKey');
  const statusEl = document.getElementById('supabaseStatus');
  
  if (!url || !key) {
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--text3)">Inte ansluten till Supabase</span>`;
    return;
  }
  
  try {
    supabaseClient = Supabase.createClient(url, key);
    isSupabaseEnabled = true;
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--emerald)">✅ Ansluten till Supabase</span>`;
    
    syncFromSupabase();
    setupRealtime();
  } catch(e) {
    console.error(e);
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--rose)">Anslutningsfel</span>`;
  }
}

function saveSupabaseConfig() {
  const url = document.getElementById('supabaseUrl').value.trim();
  const key = document.getElementById('supabaseKey').value.trim();
  if (!url || !key) return toast('Ange både URL och nyckel', 'error');
  
  localStorage.setItem('supabaseUrl', url);
  localStorage.setItem('supabaseAnonKey', key);
  toast('✅ Supabase sparad');
  closeSettings();
  setTimeout(initSupabase, 400);
}

function disconnectSupabase() {
  if (confirm('Koppla från Supabase?')) {
    localStorage.removeItem('supabaseUrl');
    localStorage.removeItem('supabaseAnonKey');
    supabaseClient = null;
    isSupabaseEnabled = false;
    toast('Supabase frånkopplad');
    closeSettings();
  }
}

async function syncFromSupabase() {
  if (!supabaseClient) return;
  // Här kan du utöka med persons och tasks sync
  console.log('Synkroniserar från Supabase...');
}

function setupRealtime() {
  if (!supabaseClient) return;
  supabaseClient.channel('tasks').on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => {
    syncFromSupabase();
  }).subscribe();
}

// === BACKUP / RESTORE ===
function getAllAppData() {
  return {
    familyTasks: JSON.parse(localStorage.getItem('familyTasks') || '[]'),
    familyTrash: JSON.parse(localStorage.getItem('familyTrash') || '[]'),
    familyPersons: JSON.parse(localStorage.getItem('familyPersons') || '[]'),
    familyPersonLabels: JSON.parse(localStorage.getItem('familyPersonLabels') || '{}'),
    familyScore: parseInt(localStorage.getItem('familyScore') || '0'),
    nightMode: localStorage.getItem('nightMode') === 'true',
    pcMode: localStorage.getItem('pcMode') === 'true',
    calMode: parseInt(localStorage.getItem('calMode') || '0'),
    savedPDFs: JSON.parse(localStorage.getItem('savedPDFs') || '[]')
  };
}

function exportData() {
  const data = getAllAppData();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `familjens-planerare-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('✅ Backup nedladdad!');
}

async function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!confirm('Importera backup? Detta skriver över nuvarande data!')) return;
  
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    
    if (data.familyTasks) localStorage.setItem('familyTasks', JSON.stringify(data.familyTasks));
    if (data.familyTrash) localStorage.setItem('familyTrash', JSON.stringify(data.familyTrash));
    if (data.familyPersons) localStorage.setItem('familyPersons', JSON.stringify(data.familyPersons));
    if (data.familyPersonLabels) localStorage.setItem('familyPersonLabels', JSON.stringify(data.familyPersonLabels));
    if (data.savedPDFs) localStorage.setItem('savedPDFs', JSON.stringify(data.savedPDFs));
    
    toast('✅ Data importerad! Laddar om...');
    setTimeout(() => location.reload(), 1200);
  } catch (e) {
    toast('❌ Fel vid import', 'error');
  }
  event.target.value = '';
}

// === Inställningar ===
function openSettings() {
  document.getElementById('settingsModal').classList.remove('h');
  document.getElementById('supabaseUrl').value = localStorage.getItem('supabaseUrl') || '';
  document.getElementById('supabaseKey').value = localStorage.getItem('supabaseAnonKey') || '';
}

function closeSettings() {
  document.getElementById('settingsModal').classList.add('h');
}

// === Lägg till inställningsknapp + init Supabase ===
document.addEventListener('DOMContentLoaded', () => {
  // Din befintliga kod...
  if(night) applyNight();
  if(localStorage.getItem('pcMode')==='true') applyPcMode(true);
  checkLoginState();
  rolloverOverdueTasks();
  updateClock(); setInterval(updateClock,1000);
  buildColorMap();
  renderCards();
  renderSavedPDFs();
  checkReminders(); setInterval(checkReminders,30000);

  // NYA FUNKTIONER
  initSupabase();

  // Lägg till inställningsknapp
  const hdrActions = document.querySelector('.hdr-actions');
  if (hdrActions) {
    const settingsBtn = document.createElement('button');
    settingsBtn.className = 'icon-btn';
    settingsBtn.innerHTML = '<i class="fas fa-cog"></i>';
    settingsBtn.title = 'Inställningar & Synk';
    settingsBtn.onclick = openSettings;
    hdrActions.appendChild(settingsBtn);
  }
});

// Dina befintliga funktioner (addTask, renderCards, etc.) fortsätter som tidigare...
</script>
</body>
</html>
